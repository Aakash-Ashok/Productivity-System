<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <style>
    .title { font: 700 30px Arial, sans-serif; fill: #000000; }
    .entity { fill: #ffffff; stroke: #000000; stroke-width: 2; rx: 14; ry: 14; }
    .label { font: 700 18px Arial, sans-serif; fill: #000000; }
    .field { font: 14px Arial, sans-serif; fill: #000000; }
    .line { stroke: #000000; stroke-width: 2; }
    .rel { font: 12px Arial, sans-serif; fill: #000000; font-weight: 700; }
  </style>
  <text x="900" y="50" text-anchor="middle" class="title">ER Diagram - AI Powered Employee Productivity and Task Management System</text>

  <rect x="60" y="110" width="220" height="150" class="entity"/>
  <text x="170" y="140" text-anchor="middle" class="label">User</text>
  <text x="80" y="170" class="field">user_id (PK)</text>
  <text x="80" y="195" class="field">username</text>
  <text x="80" y="220" class="field">email</text>
  <text x="80" y="245" class="field">role</text>

  <rect x="340" y="110" width="220" height="120" class="entity"/>
  <text x="450" y="140" text-anchor="middle" class="label">Team</text>
  <text x="360" y="170" class="field">team_id (PK)</text>
  <text x="360" y="195" class="field">team_name</text>
  <text x="360" y="220" class="field">manager_id (FK)</text>

  <rect x="620" y="90" width="240" height="190" class="entity"/>
  <text x="740" y="120" text-anchor="middle" class="label">Employee</text>
  <text x="640" y="150" class="field">employee_id (PK)</text>
  <text x="640" y="175" class="field">user_id (FK)</text>
  <text x="640" y="200" class="field">team_id (FK)</text>
  <text x="640" y="225" class="field">skills</text>
  <text x="640" y="250" class="field">experience</text>
  <text x="640" y="275" class="field">availability</text>

  <rect x="940" y="110" width="240" height="140" class="entity"/>
  <text x="1060" y="140" text-anchor="middle" class="label">Project</text>
  <text x="960" y="170" class="field">project_id (PK)</text>
  <text x="960" y="195" class="field">project_name</text>
  <text x="960" y="220" class="field">team_id (FK)</text>
  <text x="960" y="245" class="field">deadline, status</text>

  <rect x="1280" y="80" width="260" height="220" class="entity"/>
  <text x="1410" y="110" text-anchor="middle" class="label">Task</text>
  <text x="1300" y="140" class="field">task_id (PK)</text>
  <text x="1300" y="165" class="field">title, description</text>
  <text x="1300" y="190" class="field">project_id (FK)</text>
  <text x="1300" y="215" class="field">assigned_to (FK)</text>
  <text x="1300" y="240" class="field">deadline, priority</text>
  <text x="1300" y="265" class="field">status, progress</text>
  <text x="1300" y="290" class="field">required_skills</text>

  <rect x="1220" y="420" width="250" height="170" class="entity"/>
  <text x="1345" y="450" text-anchor="middle" class="label">TaskLog</text>
  <text x="1240" y="480" class="field">log_id (PK)</text>
  <text x="1240" y="505" class="field">task_id (FK)</text>
  <text x="1240" y="530" class="field">employee_id (FK)</text>
  <text x="1240" y="555" class="field">hours_spent</text>
  <text x="1240" y="580" class="field">log_date, notes</text>

  <rect x="1510" y="430" width="220" height="145" class="entity"/>
  <text x="1620" y="460" text-anchor="middle" class="label">AIResult</text>
  <text x="1530" y="490" class="field">ai_id (PK)</text>
  <text x="1530" y="515" class="field">task_id (FK)</text>
  <text x="1530" y="540" class="field">predicted_time</text>
  <text x="1530" y="565" class="field">delay_risk, suggestions</text>

  <rect x="860" y="470" width="260" height="195" class="entity"/>
  <text x="990" y="500" text-anchor="middle" class="label">Request</text>
  <text x="880" y="530" class="field">request_id (PK)</text>
  <text x="880" y="555" class="field">request_type</text>
  <text x="880" y="580" class="field">task_id (FK)</text>
  <text x="880" y="605" class="field">employee_id (FK)</text>
  <text x="880" y="630" class="field">raised_by (FK)</text>
  <text x="880" y="655" class="field">status, remarks</text>

  <rect x="490" y="470" width="260" height="195" class="entity"/>
  <text x="620" y="500" text-anchor="middle" class="label">Activity</text>
  <text x="510" y="530" class="field">activity_id (PK)</text>
  <text x="510" y="555" class="field">activity_type</text>
  <text x="510" y="580" class="field">user_id (FK)</text>
  <text x="510" y="605" class="field">task_id (FK)</text>
  <text x="510" y="630" class="field">project_id (FK)</text>
  <text x="510" y="655" class="field">title, message, rating</text>

  <rect x="1270" y="760" width="250" height="145" class="entity"/>
  <text x="1395" y="790" text-anchor="middle" class="label">Attachment</text>
  <text x="1290" y="820" class="field">attachment_id (PK)</text>
  <text x="1290" y="845" class="field">task_id (FK)</text>
  <text x="1290" y="870" class="field">uploaded_by (FK)</text>
  <text x="1290" y="895" class="field">file_path, label</text>

  <line x1="280" y1="165" x2="340" y2="165" class="line"/>
  <text x="300" y="155" class="rel">1:M</text>

  <line x1="560" y1="180" x2="620" y2="180" class="line"/>
  <text x="580" y="170" class="rel">1:M</text>

  <line x1="280" y1="220" x2="620" y2="220" class="line"/>
  <text x="430" y="210" class="rel">1:1</text>

  <line x1="860" y1="180" x2="940" y2="180" class="line"/>
  <text x="885" y="170" class="rel">1:M</text>

  <line x1="1180" y1="180" x2="1280" y2="180" class="line"/>
  <text x="1215" y="170" class="rel">1:M</text>

  <line x1="740" y1="280" x2="740" y2="350" class="line"/>
  <line x1="740" y1="350" x2="1410" y2="350" class="line"/>
  <line x1="1410" y1="350" x2="1410" y2="300" class="line"/>
  <text x="1050" y="340" class="rel">1:M</text>

  <line x1="1410" y1="300" x2="1410" y2="420" class="line"/>
  <text x="1420" y="365" class="rel">1:M</text>

  <line x1="1540" y1="300" x2="1610" y2="430" class="line"/>
  <text x="1565" y="380" class="rel">1:1</text>

  <line x1="1280" y1="520" x2="1120" y2="560" class="line"/>
  <text x="1180" y="525" class="rel">1:M</text>

  <line x1="1280" y1="215" x2="750" y2="560" class="line"/>
  <text x="940" y="395" class="rel">1:M</text>

  <line x1="1180" y1="215" x2="620" y2="470" class="line"/>
  <text x="880" y="355" class="rel">1:M</text>

  <line x1="170" y1="260" x2="560" y2="470" class="line"/>
  <text x="360" y="390" class="rel">1:M</text>

  <line x1="1060" y1="250" x2="650" y2="470" class="line"/>
  <text x="840" y="365" class="rel">1:M</text>

  <line x1="1410" y1="300" x2="1395" y2="760" class="line"/>
  <text x="1420" y="620" class="rel">1:M</text>
</svg>
