<style>
.password-success-wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:70vh;
}

.success-card{
    background:white;
    width:100%;
    max-width:650px;
    padding:50px;
    border-radius:30px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.success-icon{
    width:100px;
    height:100px;
    margin:0 auto 25px;
    border-radius:50%;
    background:linear-gradient(135deg,#22c55e,#16a34a);
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:42px;
}

.success-title{
    font-size:34px;
    font-weight:700;
    color:#0f172a;
    margin-bottom:10px;
}

.success-subtitle{
    color:#64748b;
    font-size:16px;
    line-height:1.7;
    margin-bottom:30px;
}

.info-box{
    background:#f8fafc;
    border:1px solid #e2e8f0;
    border-radius:16px;
    padding:18px;
    margin-bottom:30px;
    color:#475569;
}

.action-buttons{
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
}

.dashboard-btn{
    background:linear-gradient(
        135deg,
        #4f46e5,
        #7c3aed
    );
    color:white;
    text-decoration:none;
    padding:14px 24px;
    border-radius:14px;
    font-weight:600;
    transition:.25s;
}

.dashboard-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(79,70,229,.25);
}

.secondary-btn{
    background:#f1f5f9;
    color:#334155;
    text-decoration:none;
    padding:14px 24px;
    border-radius:14px;
    font-weight:600;
    transition:.25s;
}

.secondary-btn:hover{
    background:#e2e8f0;
}

@media(max-width:768px){

    .success-card{
        padding:30px 20px;
    }

    .success-title{
        font-size:28px;
    }

}
</style>

<section class="password-success-wrapper">

    <div class="success-card">

        <div class="success-icon">
            ✓
        </div>

        <h1 class="success-title">
            Password Updated Successfully
        </h1>

        <p class="success-subtitle">
            Your account password has been changed successfully.
            You can continue using the system securely with your new credentials.
        </p>

        <div class="info-box">
            🔒 For security reasons, make sure your new password is
            unique and not shared with anyone.
        </div>

        <div class="action-buttons">

            <a href="{% url 'dashboard' %}"
               class="dashboard-btn">
                Back to Dashboard
            </a>

            <a href="{% url 'profile' %}"
               class="secondary-btn">
                View Profile
            </a>

        </div>

    </div>

</section>
