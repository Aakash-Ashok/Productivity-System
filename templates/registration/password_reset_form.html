{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Productivity System</title>
    <link rel="stylesheet" href="{% static 'core/styles.css' %}">
</head>
<body class="login-body">
    <section class="login-card">
        <p class="eyebrow">Account Recovery</p>
        <h1>Forgot your password?</h1>
        <p class="muted">Enter your account email and we will send you a reset link.</p>
        <form method="post" class="stack">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="button" type="submit">Send Reset Link</button>
        </form>
        <div class="auth-links">
            <span class="muted">Password reset links are sent to your registered email address.</span>
            <a href="{% url 'login' %}">Back to login</a>
        </div>
    </section>
</body>
</html>
