{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Email Sent | Productivity System</title>
    <link rel="stylesheet" href="{% static 'core/styles.css' %}">
</head>
<body class="login-body">
    <section class="login-card">
        <p class="eyebrow">Account Recovery</p>
        <h1>Check your email</h1>
        <p class="muted">If the email exists in the system, a password reset link has been sent.</p>
        <div class="auth-links">
            <span class="muted">The reset link may take a minute to arrive depending on your email provider.</span>
            <a href="{% url 'login' %}">Back to login</a>
        </div>
    </section>
</body>
</html>
