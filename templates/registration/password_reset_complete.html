{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete | Productivity System</title>
    <link rel="stylesheet" href="{% static 'core/styles.css' %}">
</head>
<body class="login-body">
    <section class="login-card">
        <p class="eyebrow">Account Recovery</p>
        <h1>Password reset complete</h1>
        <p class="muted">Your password has been set successfully.</p>
        <div class="auth-links">
            <span class="muted">You can return to the platform and sign in with your new password now.</span>
            <a class="button" href="{% url 'login' %}">Go to Login</a>
        </div>
    </section>
</body>
</html>
